services:
  - type: web
    name: posturemed
    runtime: python
    buildCommand: apt-get update && apt-get install -y libgl1-mesa-glx libglib2.0-0 libgles2-mesa && pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false