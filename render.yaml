services:
  - type: web
    name: posturemed
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: apt-get update && apt-get install -y libgl1-mesa-glx libgl1-mesa-dri libgles2-mesa libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1 && pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false